<!DOCTYPE html><html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Yoga</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
body{margin:0;font-family:Poppins;background:#fff;color:#111;}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
z-index:1000;
transition:0.4s;
}

.navbar.hide{transform:translateY(-100%);}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
text-align:center;
color:#a5d6a7;
}

.logo svg{width:60px;height:60px;}

/* MENU RIGHT */
.menu-btn{
font-size:28px;
cursor:pointer;
color:white;
}

.menu{
position:fixed;
top:0;
right:-100%;
width:50%;
height:100vh;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
transition:0.4s;
}

.menu a{
margin:20px 0;
text-decoration:none;
color:black;
font-size:28px;
font-weight:500;
}

.menu.active{right:0;}

.menu a{
margin:15px 0;
text-decoration:none;
color:black;
font-size:18px;
}

.menu.active{right:0;}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1545389336-cf090694435e') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{font-size:42px;}
.hero p{font-size:18px;}

.btn{
margin-top:20px;
padding:14px 30px;
background:#8bc34a;
border:none;
border-radius:30px;
color:white;
}

section{padding:80px 20px;text-align:center;}

footer{background:#111;color:white;padding:30px;text-align:center;}

.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;text-decoration:none;}
</style></head><body><!-- NAVBAR --><div class="navbar" id="navbar"><div class="menu-btn" onclick="toggleMenu()">☰</div><div class="logo">
<svg viewBox="0 0 64 64">
<circle cx="32" cy="32" r="30" stroke="#a5d6a7" stroke-width="2" fill="none"/>
<path d="M32 20C28 28 26 32 26 36C26 42 28 46 32 50C36 46 38 42 38 36C38 32 36 28 32 20Z" fill="#a5d6a7"/>
</svg>
<div>Easy Yoga</div>
</div></div><!-- MENU --><div class="menu" id="menu">
<a href="#">Acasă</a>
<a href="#">Despre</a>
<a href="#">Clase</a>
<a href="#">Contact</a>
</div><!-- HERO --><div class="hero">
<div>
<h1>Aici începe călătoria spre liniștea ta interioară</h1>
<p>Easy Yoga — Studioul tău în Chișinău</p>
<button class="btn">Vezi programul</button>
</div>
</div><section>
<h2>Bine ai venit</h2>
<p>Yoga pentru corp și suflet.</p>
</section><footer>© Easy Yoga</footer><a class="whatsapp" href="https://wa.me/37369404887">💬</a>

<script>
function toggleMenu(){
document.getElementById('menu').classList.toggle('active');
}

let lastScroll=0;
const navbar=document.getElementById('navbar');

window.addEventListener('scroll',()=>{
let current=window.pageYOffset;
if(current>lastScroll){navbar.classList.add('hide');}
else{navbar.classList.remove('hide');}
lastScroll=current;
});
</script></body>
</html>
