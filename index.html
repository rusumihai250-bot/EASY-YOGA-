<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Yoga</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #ffffff;
  color: #111;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
  transition: 0.3s;
  z-index: 1000;
}

header.hidden {
  top: -100px;
}

.logo {
  font-size: 22px;
  letter-spacing: 2px;
}

/* MENU BUTTON */
.menu-btn {
  font-size: 26px;
  cursor: pointer;
}

/* SIDE MENU */
.menu {
  position: fixed;
  right: -100%;
  top: 0;
  width: 260px;
  height: 100%;
  background: #f5f5f5;
  padding: 40px 20px;
  transition: 0.3s;
}

.menu.active {
  right: 0;
}

.menu a {
  display: block;
  margin: 20px 0;
  text-decoration: none;
  color: black;
  font-size: 18px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 100px 10%;
}

.text {
  max-width: 500px;
}

.text h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

.text p {
  font-size: 18px;
  margin-bottom: 20px;
}

.highlight {
  font-weight: bold;
  border-bottom: 2px solid black;
}

/* IMAGE */
.image img {
  max-width: 350px;
  opacity: 0.9;
}

/* BUTTONS */
.buttons a {
  display: inline-block;
  margin-right: 10px;
  padding: 10px 20px;
  border: 1px solid black;
  text-decoration: none;
  color: black;
  transition: 0.3s;
}

.buttons a:hover {
  background: black;
  color: white;
}
</style>
</head>

<body>

<header id="header">
  <div class="logo">Easy Yoga</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <a href="#">Acasă</a>
  <a href="#">Despre</a>
  <a href="#">Program</a>
  <a href="#">Contact</a>
</div>

<div class="hero">
  <div class="text">
    <p>O lecție de yoga în natură</p>
    <p class="highlight">GRATIS!</p>

    <h1>Yoga pentru începători</h1>

    <p>Trăiește în moment</p>

    <p>
      📍 Parcul "Valea Morilor", Chișinău<br>
      📅 Duminică 19 aprilie<br>
      ⏰ Ora 11:00
    </p>

    <div class="buttons">
      <a href="https://instagram.com" target="_blank">Instagram</a>
      <a href="https://tiktok.com" target="_blank">TikTok</a>
      <a href="https://wa.me/373XXXXXXXX" target="_blank">WhatsApp</a>
    </div>
  </div>

  <div class="image">
    <img src="yoga.png" alt="Yoga">
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

let lastScroll = 0;
const header = document.getElementById("header");

window.addEventListener("scroll", () => {
  let currentScroll = window.pageYOffset;

  if (currentScroll > lastScroll) {
    header.classList.add("hidden");
  } else {
    header.classList.remove("hidden");
  }

  lastScroll = currentScroll;
});
</script>

</body>
</html>
