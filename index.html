<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Yoga</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #ffffff;
  color: #222;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  top: 0;
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  transition: 0.3s;
  z-index: 1000;
}

header.hidden {
  top: -100px;
}

.logo img {
  height: 50px;
  border-radius: 50%;
}

/* MENU */
.menu-btn {
  font-size: 28px;
  cursor: pointer;
}

.menu {
  position: fixed;
  right: -100%;
  top: 0;
  width: 260px;
  height: 100%;
  background: #f5f5f5;
  padding: 40px;
  transition: 0.3s;
}

.menu.active {
  right: 0;
}

.menu a {
  display: block;
  margin: 20px 0;
  text-decoration: none;
  color: black;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 100px 10%;
}

.hero-text {
  max-width: 500px;
}

.hero-text h1 {
  font-size: 45px;
}

.highlight {
  font-weight: bold;
  border-bottom: 2px solid black;
}

.hero img {
  max-width: 350px;
}

/* BUTTONS */
.buttons a {
  padding: 10px 20px;
  border: 1px solid black;
  text-decoration: none;
  margin-right: 10px;
  color: black;
}

.buttons a:hover {
  background: black;
  color: white;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 10px;
  padding: 60px;
}

.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* PROGRAM */
.program {
  padding: 80px 20px;
  text-align: center;
}

/* POSES */
.poses {
  padding: 60px;
  text-align: center;
}

.pose-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.pose {
  border: 1px solid #ddd;
  padding: 15px;
}
